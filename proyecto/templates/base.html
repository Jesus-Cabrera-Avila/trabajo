<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Mi App{% endblock %}

    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            min-height: 100vh;
        }

        .main-container {
            background: transparent;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="{{ url_for('index') }}">Mi App</a>

        <div>
            {% if "usuario" in session %}
                <span class="text-light me-3">Hola, {{ session["usuario"] }}</span>

                <a class="btn btn-outline-light me-2" href="{{ url_for('tareas') }}">Tareas</a>
                <a class="btn btn-outline-light me-2" href="{{ url_for('perfil') }}">Perfil</a>
                <a class="btn btn-danger" href="{{ url_for('logout') }}">Cerrar sesión</a>
            {% else %}
                <a class="btn btn-outline-light me-2" href="{{ url_for('login') }}">Login</a>
                <a class="btn btn-outline-light" href="{{ url_for('registro') }}">Registro</a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container mt-4 main-container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
