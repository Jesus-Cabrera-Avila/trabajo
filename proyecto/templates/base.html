<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Mi App{% endblock %}</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="{{ url_for('index') }}">Mi App</a>

        <div>
            <a class="btn btn-outline-light me-2" href="{{ url_for('login') }}">Login</a>
            <a class="btn btn-outline-light me-2" href="{{ url_for('registro') }}">Registro</a>
            <a class="btn btn-outline-light me-2" href="{{ url_for('recuperar') }}">Recuperar</a>
            <a class="btn btn-outline-light" href="{{ url_for('tareas') }}">Tareas</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

</body>
</html>
