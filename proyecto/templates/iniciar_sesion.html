{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="col-md-4">
        <div class="card p-4 shadow" style="background-color: #1f2a36; color: #ffffff; border-radius: 15px;">

            <h2 class="text-center mb-4">Iniciar sesión</h2>

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label" style="color: #4da3ff;">Email</label>
                    <input type="email" class="form-control" 
                           style="background-color: #2c3e50; color: white; border: none;" required>
                </div>

                <div class="mb-3">
                    <label class="form-label" style="color: #4da3ff;">Contraseña</label>
                    <input type="password" class="form-control" 
                           style="background-color: #2c3e50; color: white; border: none;" required>
                </div>

                <button class="btn btn-primary w-100 mb-3">Iniciar Sesion</button>

                <div class="text-center">
                    <a href="{{ url_for('recuperar') }}" style="color: #4da3ff; text-decoration: none;">
                        ¿Se te olvidó la contraseña?
                    </a>
                </div>
            </form>

        </div>
    </div>
</div>
{% endblock %}
