{% extends "base.html" %}

{% block title %}Recuperar contraseña{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="col-md-4">
        <div class="card p-4 shadow" style="background-color: #1f2a36; color: #ffffff; border-radius: 15px;">

            <h2 class="text-center mb-4">Recuperar contraseña</h2>

            <form method="POST">

                <div class="mb-3">
                    <label class="form-label" style="color: #4da3ff;">Correo electrónico</label>
                    <input type="email" class="form-control"
                           style="background-color: #2c3e50; color: white; border: none;"
                           required>
                </div>

                <button class="btn btn-primary w-100 mb-3">
                    Enviar enlace
                </button>

            </form>

        </div>
    </div>
</div>
{% endblock %}
