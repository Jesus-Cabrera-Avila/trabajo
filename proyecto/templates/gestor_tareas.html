{% extends "base.html" %}

{% block title %}Tareas{% endblock %}

{% block content %}
<div class="container-fluid mt-3">

    <div class="row">

        <div class="col-md-3">
            <div class="p-3" style="background-color:#1f2a36; color:white; border-radius:15px; min-height:80vh;">

                <h5 class="mb-4">Tareas</h5>

                <button class="btn btn-primary w-100 mb-3">
                    + Crear
                </button>

                <ul class="list-unstyled">
                    <li class="mb-2 p-2 rounded" style="background-color:#2c3e50;">
                        Todas las tareas
                    </li>
                    <li class="mb-2 p-2">
                        Importantes
                    </li>
                </ul>

            </div>
        </div>

        <div class="col-md-9">
            <div class="p-4" style="background-color:#1f2a36; color:white; border-radius:15px; min-height:80vh;">

                <h4 class="mb-3">Mis tareas</h4>


                <div class="input-group mb-4">
                    <input type="text" class="form-control"
                           placeholder="Agregar una tarea..."
                           style="background-color:#2c3e50; color:white; border:none;">
                    <button class="btn btn-success">
                        Agregar
                    </button>
                </div>

                <ul class="list-group">

                    <li class="list-group-item d-flex justify-content-between align-items-center"
                        style="background-color:#2c3e50; color:white; border:none;">

                        <div>
                            <strong>Ejemplo de tarea</strong><br>
                            <small style="color:#4da3ff;">20/04/2026 - 3:30 PM</small>
                        </div>

                        <button class="btn btn-danger btn-sm">Eliminar</button>
                    </li>

                    <li class="list-group-item d-flex justify-content-between align-items-center mt-2"
                        style="background-color:#2c3e50; color:white; border:none;">

                        <div>
                            <strong>Otra tarea</strong><br>
                            <small style="color:#4da3ff;">20/04/2026 - 4:00 PM</small>
                        </div>

                        <button class="btn btn-danger btn-sm">Eliminar</button>
                    </li>

                </ul>

            </div>
        </div>

    </div>

</div>
{% endblock %}
